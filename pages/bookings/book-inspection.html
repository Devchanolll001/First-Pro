<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Inspection | HOM-ANOLL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../../css/bookings.css">
</head>
<body>
    <main class="booking-page">
        <a class="booking-brand" href="../dashboard/dashboard.html">
            <img src="../../assets/assets/logo.png" alt="HOM-ANOLL Logo">
            <span>HOM-ANOLL</span>
        </a>

        <section class="booking-shell">
            <div class="booking-visual">
                <span class="section-kicker">Inspection Request</span>
                <h1>Book Property Inspection</h1>
                <p>Pick a date and time. We will prepare the property details, tour plan, and follow-up support before your visit.</p>

                <div class="booking-benefits">
                    <div><i class="fas fa-house-circle-check"></i><span>Verified properties</span></div>
                    <div><i class="fas fa-calendar-days"></i><span>Flexible scheduling</span></div>
                    <div><i class="fas fa-headset"></i><span>Advisor support</span></div>
                </div>
            </div>

            <form id="bookingForm" class="booking-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="customerName">Full Name</label>
                        <input type="text" id="customerName" placeholder="Your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="customerEmail">Email</label>
                        <input type="email" id="customerEmail" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="customerPhone">Phone Number</label>
                        <input type="tel" id="customerPhone" placeholder="+234..." required>
                    </div>

                    <div class="form-group">
                        <label for="inspectionDate">Select Date</label>
                        <input type="date" id="inspectionDate" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="inspectionTime">Select Time</label>
                    <select id="inspectionTime">
                        <option>09:00 AM</option>
                        <option>10:00 AM</option>
                        <option>11:00 AM</option>
                        <option>01:00 PM</option>
                        <option>02:00 PM</option>
                        <option>03:00 PM</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Add notes about the property, location, or preferred visit style."></textarea>
                </div>

                <button type="submit">
                    <i class="fas fa-calendar-plus"></i>
                    Book Inspection
                </button>
            </form>
        </section>
    </main>

    <script src="../../js/customer/bookings.js"></script>
    <footer class="copyright-footer">
        <p>&copy; 2026 HOM-ANOLL. All Rights Reserved.</p>
    </footer>
</body>
</html>
